<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ЛР1 - Варіант 7</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Сервіс реєстрації на факультатив/подію</h1>
            <p>Заповніть форму та натисніть "Зберегти"</p>
        </header>

        <main class="main-layout">
            <section id="create-section">
                <h2 id="formTitle">Додати заявку на реєстрацію</h2>
                <form id="eventForm">
                    <input type="hidden" id="editId" value="" />
                    
                    <div class="field">
                        <label for="titleInput">Назва події</label>
                        <input id="titleInput" type="text" placeholder="Напр. Факультатив" />
                        <p class="error-text" id="titleError"></p>
                    </div>

                    <div class="field">
                        <label for="dateInput">Дата проведення</label>
                        <input id="dateInput" type="date" />
                        <p class="error-text" id="dateError"></p>
                    </div>

                    <div class="field">
                        <label for="locationInput">Локація</label>
                        <input id="locationInput" type="text" placeholder="Напр. ауд 666" />
                        <p class="error-text" id="locationError"></p>
                    </div>

                    <div class="field">
                        <label for="capacityInput">Місце</label>
                        <input id="capacityInput" type="number" placeholder="Напр. 3" />
                        <p class="error-text" id="capacityError"></p>
                    </div>

                    <div class="field">
                        <label for="descInput">Опис</label>
                        <textarea id="descInput" rows="3" placeholder="Додайте опис ПІБ обов'язково"></textarea>
                        <p class="error-text" id="descError"></p>
                    </div>

                    <div class="buttons">
                        <button type="submit" id="submitBtn">Зберегти</button>
                        <button type="button" id="cancelBtn" class="hidden">Скасувати</button>
                    </div>
                </form>
            </section>

            <section id="list-section">
                <h2>Список реєстрацій</h2>
                
                <div class="filters">
                    <input type="text" id="searchInput" placeholder="Пошук за назвою..." />
                    <select id="sortSelect">
                        <option value="none">Без сортування</option>
                        <option value="date">За датою</option>
                        <option value="capacity">За місцями</option>
                    </select>
                </div>

                <table id="eventsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Назва</th>
                            <th>Дата</th>
                            <th>Локація</th>
                            <th>Місце</th>
                            <th>Опис</th>
                            <th>Дії</th>
                        </tr>
                    </thead>
<tbody id="eventsTableBody"></tbody>
 </table>
</section>
</main>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <link rel="stylesheet" href="./index.css">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Лаб1 Варіант 7</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Реєстрації на події</h1>
        </header>

        <main class="main-layout">
            <section id="create-section">
                <h2>Додати нову подію</h2>
                <form id="eventForm">
                    <div class="field">
                        <label for="titleInput">Назва події</label>
                        <input id="titleInput" type="text" placeholder="Будь яка подія" />
                        <p class="error-text" id="titleError"></p>
                    </div>

                    <div class="field">
                        <label for="dateInput">Дата проведення</label>
                        <input id="dateInput" type="date" />
                        <p class="error-text" id="dateError"></p>
                    </div>

                    <div class="field">
                        <label for="locationInput">Локація</label>
                        <input id="locationInput" type="text" placeholder="Ауд. 666" />
                        <p class="error-text" id="locationError"></p>
                    </div>

                    <div class="field">
                        <label for="capacityInput">Кількість місць</label>
                        <input id="capacityInput" type="number" />
                        <p class="error-text" id="capacityError"></p>
                    </div>

                    <div class="field">
                        <label for="descInput">Опис</label>
                        <textarea id="descInput" rows="3"></textarea>
                        <p class="error-text" id="descError"></p>
                    </div>

                    <div class="buttons">
                        <button type="submit">Додати подію</button>
                        <button type="button" id="resetBtn">Очистити</button>
                    </div>
                </form>
            </section>

            <section id="list-section">
                <h2>Список подій</h2>
                <table id="eventsTable">
                    <thead>
                        <tr>
                            <th>#ID</th>
                            <th>Назва</th>
                            <th>Дата</th>
                            <th>Місць</th>
                            <th>Дії</th>
                        </tr>
                    </thead>
                    <tbody id="eventsTableBody">
                        </tbody>
                </table>
            </section>
        </main>
    </div>
</body>
<script src="script.js"></script>
</html>
